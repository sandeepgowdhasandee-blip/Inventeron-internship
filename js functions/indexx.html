<!DOCTYPE html>
<html>
<head>
    <title>JS Function Types Demo</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>

    <body>

<h1>JavaScript Function Types</h1>

<div class="container declaration">
    <h2>1. Function Declaration</h2>
    <button onclick="declarationFunc()">Click Me</button>
</div>

<div class="container expression">
    <h2>2. Function Expression</h2>
    <button onclick="expressionFunc()">Click Me</button>
</div>

<div class="container arrow">
    <h2>3. Arrow Function</h2>
    <button onclick="arrowFunc()">Click Me</button>
</div>

<div class="container callback">
    <h2>4. Callback Function (Form Submit)</h2>
    <form onsubmit="handleSubmit(event)">
        <button type="submit">Submit</button>
    </form>
</div>
</body>
</head>
</html>
